name: Integration Level 2 + 3

on:
  pull_request:
    paths:
      - 'services/**'
      - 'contracts/**'
      - 'scripts/test-level2-11-20cases.sh'
      - 'scripts/test-level3-21-30cases.sh'
      - 'infra/docker-compose.dev.yml'
      - '.github/workflows/integration-level2-level3.yml'
  push:
    branches:
      - main
    paths:
      - 'services/**'
      - 'contracts/**'
      - 'scripts/test-level2-11-20cases.sh'
      - 'scripts/test-level3-21-30cases.sh'
      - 'infra/docker-compose.dev.yml'
      - '.github/workflows/integration-level2-level3.yml'

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Booking service unit/integration tests
        run: npm run test --workspace @services/booking-service -- --watchman=false --runInBand

      - name: API gateway unit tests
        run: npm run test --workspace @services/api-gateway -- --watchman=false --runInBand

  integration-tests:
    runs-on: ubuntu-latest
    needs: unit-tests
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Ensure scripts are executable
        run: |
          chmod +x scripts/test-level2-11-20cases.sh
          chmod +x scripts/test-level3-21-30cases.sh

      - name: Start stack
        run: docker compose -f infra/docker-compose.dev.yml up -d --build

      - name: Wait for gateway
        run: |
          for i in $(seq 1 90); do
            if curl -s http://localhost:3000/health >/dev/null 2>&1; then
              exit 0
            fi
            sleep 2
          done
          echo "Gateway is not healthy in time"
          docker compose -f infra/docker-compose.dev.yml ps
          exit 1

      - name: Wait for booking upstream
        run: |
          for i in $(seq 1 120); do
            if docker compose -f infra/docker-compose.dev.yml exec -T api-gateway \
              node -e "fetch('http://booking-service:3003/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"; then
              exit 0
            fi
            sleep 1
          done
          echo "Booking upstream is not healthy in time"
          docker compose -f infra/docker-compose.dev.yml ps
          docker compose -f infra/docker-compose.dev.yml logs --no-color --tail=120 booking-service api-gateway
          exit 1

      - name: Run Level 2 integration (11-20)
        run: BASE_URL=http://localhost:3000 ./scripts/test-level2-11-20cases.sh

      - name: Run Level 3 integration (21-30)
        run: BASE_URL=http://localhost:3000 ./scripts/test-level3-21-30cases.sh

      - name: Dump logs on failure
        if: failure()
        run: docker compose -f infra/docker-compose.dev.yml logs --no-color --tail=200

      - name: Shutdown stack
        if: always()
        run: docker compose -f infra/docker-compose.dev.yml down -v
