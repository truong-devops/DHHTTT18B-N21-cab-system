openapi: 3.1.0
info:
  title: Review Service API
  version: 1.0.0
  description: |
    Review service for submitting, listing, updating, and deleting ride reviews.
servers:
  - url: http://localhost:3009
    description: Direct review-service
  - url: http://localhost:3000
    description: API Gateway (prefix /v1/reviews)
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    Review:
      type: object
      properties:
        id: { type: string }
        rideId: { type: string }
        riderId: { type: string }
        driverId: { type: string }
        rating: { type: integer, minimum: 1, maximum: 5 }
        comment: { type: [string, 'null'] }
        status: { type: string }
        statusUpdatedAt: { type: string, format: date-time }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
      required: [id, rideId, riderId, driverId, rating, status]
    ErrorResponse:
      type: object
      properties:
        error:
          type: object
          properties:
            code: { type: string }
            message: { type: string }
            details:
              oneOf:
                - type: array
                  items: {}
                - type: object
          required: [code, message]
        traceId: { type: [string, 'null'] }
      required: [error]
  responses:
    Error400:
      description: Bad Request
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorResponse' }
          examples:
            validation:
              value: { error: { code: VALIDATION_ERROR, message: "Validation failed", details: ["headers.Idempotency-Key: is required"] } }
    Error401:
      description: Unauthorized
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorResponse' }
          examples:
            unauthorized:
              value: { error: { code: UNAUTHORIZED, message: "Missing authorization token", details: [] } }
    Error403:
      description: Forbidden
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorResponse' }
          examples:
            forbidden:
              value: { error: { code: FORBIDDEN, message: "Forbidden", details: [] } }
    Error404:
      description: Not Found
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorResponse' }
          examples:
            notFound:
              value: { error: { code: NOT_FOUND, message: "Review not found", details: [] } }
    Error409:
      description: Conflict
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorResponse' }
          examples:
            conflict:
              value: { error: { code: INVALID_STATE_TRANSITION, message: "Invalid transition from SUBMITTED to DELETED", details: [] } }
    Error422:
      description: Unprocessable Entity
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorResponse' }
          examples:
            unprocessable:
              value: { error: { code: VALIDATION_ERROR, message: "Invalid payload", details: [] } }
    Error429:
      description: Too Many Requests
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorResponse' }
          examples:
            rateLimit:
              value: { error: { code: RATE_LIMITED, message: "Too many requests", details: [] } }
    Error500:
      description: Internal Server Error
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorResponse' }
          examples:
            internal:
              value: { error: { code: INTERNAL, message: "Unexpected error", details: [] } }
paths:
  /health:
    get:
      summary: Health check
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { type: object, properties: { ok: { type: boolean } } }
              examples: { ok: { value: { ok: true } } }
        '400': { $ref: '#/components/responses/Error400' }
        '401': { $ref: '#/components/responses/Error401' }
        '403': { $ref: '#/components/responses/Error403' }
        '404': { $ref: '#/components/responses/Error404' }
        '409': { $ref: '#/components/responses/Error409' }
        '422': { $ref: '#/components/responses/Error422' }
        '429': { $ref: '#/components/responses/Error429' }
        '500': { $ref: '#/components/responses/Error500' }
  /healthz:
    get:
      summary: Health check (alias)
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { type: object, properties: { ok: { type: boolean } } }
              examples: { ok: { value: { ok: true } } }
        '400': { $ref: '#/components/responses/Error400' }
        '401': { $ref: '#/components/responses/Error401' }
        '403': { $ref: '#/components/responses/Error403' }
        '404': { $ref: '#/components/responses/Error404' }
        '409': { $ref: '#/components/responses/Error409' }
        '422': { $ref: '#/components/responses/Error422' }
        '429': { $ref: '#/components/responses/Error429' }
        '500': { $ref: '#/components/responses/Error500' }
  /readyz:
    get:
      summary: Readiness check
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { type: object, properties: { ok: { type: boolean } } }
              examples: { ok: { value: { ok: true } } }
        '400': { $ref: '#/components/responses/Error400' }
        '401': { $ref: '#/components/responses/Error401' }
        '403': { $ref: '#/components/responses/Error403' }
        '404': { $ref: '#/components/responses/Error404' }
        '409': { $ref: '#/components/responses/Error409' }
        '422': { $ref: '#/components/responses/Error422' }
        '429': { $ref: '#/components/responses/Error429' }
        '500': { $ref: '#/components/responses/Error500' }
  /v1/reviews:
    post:
      summary: Create review
      description: Create a review (Idempotency-Key header required).
      security:
        - bearerAuth: []
      parameters:
        - name: Idempotency-Key
          in: header
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [rideId, driverId, rating]
              properties:
                rideId: { type: string }
                driverId: { type: string }
                rating: { type: integer, minimum: 1, maximum: 5 }
                comment: { type: string }
                status: { type: string }
            examples:
              create:
                value: { rideId: "ride_123", driverId: "driver_1", rating: 5, comment: "great" }
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: '#/components/schemas/Review' }
              examples:
                success:
                  value:
                    data:
                      id: "b163986f-6cae-4fd5-a82e-ecce41039ba3"
                      rideId: "ride_123"
                      riderId: "user_1"
                      driverId: "driver_1"
                      rating: 5
                      comment: "great"
                      status: "submitted"
                      statusUpdatedAt: "2026-01-29T20:55:26.358Z"
                      createdAt: "2026-01-29T20:55:26.358Z"
                      updatedAt: "2026-01-29T20:55:26.358Z"
        '200':
          description: OK (idempotent replay)
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: '#/components/schemas/Review' }
        '204':
          description: No Content (not used)
        '400': { $ref: '#/components/responses/Error400' }
        '401': { $ref: '#/components/responses/Error401' }
        '403': { $ref: '#/components/responses/Error403' }
        '404': { $ref: '#/components/responses/Error404' }
        '409': { $ref: '#/components/responses/Error409' }
        '422': { $ref: '#/components/responses/Error422' }
        '429': { $ref: '#/components/responses/Error429' }
        '500': { $ref: '#/components/responses/Error500' }
    get:
      summary: List reviews
      description: List reviews by riderId and optional status.
      security:
        - bearerAuth: []
      parameters:
        - name: status
          in: query
          schema: { type: string }
        - name: riderId
          in: query
          schema: { type: string }
        - name: limit
          in: query
          schema: { type: integer, minimum: 1, maximum: 100, default: 20 }
        - name: cursor
          in: query
          schema: { type: string }
        - name: sort
          in: query
          schema: { type: string, enum: [createdAt, -createdAt], default: -createdAt }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items: { $ref: '#/components/schemas/Review' }
                  nextCursor: { type: [string, 'null'] }
              examples:
                success:
                  value:
                    data:
                      - id: "b163986f-6cae-4fd5-a82e-ecce41039ba3"
                        rideId: "ride_123"
                        riderId: "user_1"
                        driverId: "driver_1"
                        rating: 5
                        comment: "great"
                        status: "submitted"
                        statusUpdatedAt: "2026-01-29T20:55:26.358Z"
                        createdAt: "2026-01-29T20:55:26.358Z"
                        updatedAt: "2026-01-29T20:55:26.358Z"
                    nextCursor: null
        '201':
          description: Created (not used)
        '204':
          description: No Content (not used)
        '400': { $ref: '#/components/responses/Error400' }
        '401': { $ref: '#/components/responses/Error401' }
        '403': { $ref: '#/components/responses/Error403' }
        '404': { $ref: '#/components/responses/Error404' }
        '409': { $ref: '#/components/responses/Error409' }
        '422': { $ref: '#/components/responses/Error422' }
        '429': { $ref: '#/components/responses/Error429' }
        '500': { $ref: '#/components/responses/Error500' }
  /v1/reviews/{id}:
    get:
      summary: Get review by id
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: '#/components/schemas/Review' }
              examples:
                success:
                  value:
                    data:
                      id: "b163986f-6cae-4fd5-a82e-ecce41039ba3"
                      rideId: "ride_123"
                      riderId: "user_1"
                      driverId: "driver_1"
                      rating: 5
                      comment: "great"
                      status: "submitted"
                      statusUpdatedAt: "2026-01-29T20:55:26.358Z"
                      createdAt: "2026-01-29T20:55:26.358Z"
                      updatedAt: "2026-01-29T20:55:26.358Z"
        '204':
          description: No Content (not used)
        '400': { $ref: '#/components/responses/Error400' }
        '401': { $ref: '#/components/responses/Error401' }
        '403': { $ref: '#/components/responses/Error403' }
        '404': { $ref: '#/components/responses/Error404' }
        '409': { $ref: '#/components/responses/Error409' }
        '422': { $ref: '#/components/responses/Error422' }
        '429': { $ref: '#/components/responses/Error429' }
        '500': { $ref: '#/components/responses/Error500' }
    patch:
      summary: Update review
      description: Update rating/comment/status.
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                rating: { type: integer, minimum: 1, maximum: 5 }
                comment: { type: string }
                status: { type: string }
                statusReason: { type: string }
            examples:
              update:
                value: { rating: 4, comment: "updated", status: "submitted" }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: '#/components/schemas/Review' }
              examples:
                success:
                  value:
                    data:
                      id: "b163986f-6cae-4fd5-a82e-ecce41039ba3"
                      rating: 4
                      comment: "updated"
                      status: "submitted"
        '204':
          description: No Content (not used)
        '400': { $ref: '#/components/responses/Error400' }
        '401': { $ref: '#/components/responses/Error401' }
        '403': { $ref: '#/components/responses/Error403' }
        '404': { $ref: '#/components/responses/Error404' }
        '409': { $ref: '#/components/responses/Error409' }
        '422': { $ref: '#/components/responses/Error422' }
        '429': { $ref: '#/components/responses/Error429' }
        '500': { $ref: '#/components/responses/Error500' }
    delete:
      summary: Delete review
      description: Marks review status to deleted.
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: '#/components/schemas/Review' }
              examples:
                success:
                  value:
                    data:
                      id: "b163986f-6cae-4fd5-a82e-ecce41039ba3"
                      status: "deleted"
        '204':
          description: No Content (not used)
        '400': { $ref: '#/components/responses/Error400' }
        '401': { $ref: '#/components/responses/Error401' }
        '403': { $ref: '#/components/responses/Error403' }
        '404': { $ref: '#/components/responses/Error404' }
        '409': { $ref: '#/components/responses/Error409' }
        '422': { $ref: '#/components/responses/Error422' }
        '429': { $ref: '#/components/responses/Error429' }
        '500': { $ref: '#/components/responses/Error500' }
