openapi: 3.1.0
info:
  title: API Gateway
  version: 1.0.0
  description: |
    Unified HTTP gateway that proxies requests to backend services.
    - /v1/:domain/* is forwarded to the matching service base URL.
    - JWT is required for all domains except those in AUTH_PUBLIC_DOMAINS (default: auth).
    - Gateway injects x-user-id/x-user-role/x-user-roles into upstream requests.
servers:
  - url: http://localhost:3000
    description: API Gateway
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    ErrorResponse:
      type: object
      properties:
        error:
          type: object
          properties:
            code: { type: string }
            message: { type: string }
            details:
              type: array
              items: {}
          required: [code, message]
        traceId: { type: [string, "null"] }
      required: [error]
  responses:
    Error400:
      description: Bad Request
      content:
        application/json:
          schema: { $ref: "#/components/schemas/ErrorResponse" }
          examples:
            badRequest:
              value:
                error: { code: BAD_REQUEST, message: "Invalid request", details: [] }
    Error401:
      description: Unauthorized
      content:
        application/json:
          schema: { $ref: "#/components/schemas/ErrorResponse" }
          examples:
            unauthorized:
              value:
                error: { code: UNAUTHORIZED, message: "Missing authorization token", details: [] }
    Error403:
      description: Forbidden
      content:
        application/json:
          schema: { $ref: "#/components/schemas/ErrorResponse" }
          examples:
            forbidden:
              value:
                error: { code: FORBIDDEN, message: "Forbidden", details: [] }
    Error404:
      description: Not Found
      content:
        application/json:
          schema: { $ref: "#/components/schemas/ErrorResponse" }
          examples:
            notFound:
              value:
                error: { code: NOT_FOUND, message: "Route not found", details: [] }
    Error409:
      description: Conflict
      content:
        application/json:
          schema: { $ref: "#/components/schemas/ErrorResponse" }
          examples:
            conflict:
              value:
                error: { code: CONFLICT, message: "Resource conflict", details: [] }
    Error422:
      description: Unprocessable Entity
      content:
        application/json:
          schema: { $ref: "#/components/schemas/ErrorResponse" }
          examples:
            unprocessable:
              value:
                error: { code: VALIDATION_ERROR, message: "Validation failed", details: [] }
    Error429:
      description: Too Many Requests
      content:
        application/json:
          schema: { $ref: "#/components/schemas/ErrorResponse" }
          examples:
            throttled:
              value:
                error: { code: RATE_LIMITED, message: "Too many requests", details: [] }
    Error500:
      description: Internal Server Error
      content:
        application/json:
          schema: { $ref: "#/components/schemas/ErrorResponse" }
          examples:
            internal:
              value:
                error: { code: INTERNAL, message: "Internal server error", details: [] }
    Error502:
      description: Upstream Unavailable
      content:
        application/json:
          schema: { $ref: "#/components/schemas/ErrorResponse" }
          examples:
            upstreamUnavailable:
              value:
                error: { code: UPSTREAM_UNAVAILABLE, message: "Upstream unavailable", details: [] }
    Error504:
      description: Upstream Timeout
      content:
        application/json:
          schema: { $ref: "#/components/schemas/ErrorResponse" }
          examples:
            upstreamTimeout:
              value:
                error: { code: UPSTREAM_TIMEOUT, message: "Upstream request timed out", details: [] }
paths:
  /health:
    get:
      summary: Health check
      description: Returns gateway health status.
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { type: object, properties: { ok: { type: boolean } } }
              examples:
                ok:
                  value: { ok: true }
        "500": { $ref: "#/components/responses/Error500" }
  /healthz:
    get:
      summary: Health check (alias)
      description: Returns gateway health status.
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { type: object, properties: { ok: { type: boolean } } }
              examples:
                ok:
                  value: { ok: true }
        "500": { $ref: "#/components/responses/Error500" }
  /readyz:
    get:
      summary: Readiness check
      description: Returns gateway readiness status.
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { type: object, properties: { ok: { type: boolean } } }
              examples:
                ok:
                  value: { ok: true }
        "500": { $ref: "#/components/responses/Error500" }
  /v1/{domain}:
    parameters:
      - name: domain
        in: path
        required: true
        schema:
          type: string
          enum:
            - auth
            - bookings
            - driver
            - drivers
            - internal
            - admin
            - payments
            - pricing
            - reviews
            - rides
            - users
            - notifications
        description: Target service domain.
    get:
      summary: Proxy GET to service root
      description: Proxies GET /v1/{domain} to the corresponding service.
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Upstream response (pass-through)
          content:
            application/json:
              schema: {}
              examples:
                success:
                  value: { data: {} }
        "400": { $ref: "#/components/responses/Error400" }
        "401": { $ref: "#/components/responses/Error401" }
