openapi: 3.0.3
info:
  title: pricing-service
  version: 0.1.0
paths:
  /health:
    get:
      summary: Health check
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
  /ready:
    get:
      summary: Readiness check (Redis)
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
        '503':
          description: Redis unavailable
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
  /v1/pricing/quotes:
    post:
      summary: Create fare quote
      security:
        - bearerAuth: []
        - internalKey: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/QuoteRequest'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/QuoteResponse'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /v1/pricing/quotes/{quoteId}:
    get:
      summary: Get quote by id
      security:
        - bearerAuth: []
        - internalKey: []
      parameters:
        - in: path
          name: quoteId
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/QuoteResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '410':
          description: Quote expired
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /v1/pricing/finalize:
    post:
      summary: Finalize fare
      security:
        - bearerAuth: []
        - internalKey: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FinalizeRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FinalizeResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '410':
          description: Quote expired
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    internalKey:
      type: apiKey
      in: header
      name: x-internal-key
  schemas:
    QuoteRequest:
      type: object
      required: [pickup, dropoff, serviceType]
      properties:
        pickup:
          $ref: '#/components/schemas/LatLng'
        dropoff:
          $ref: '#/components/schemas/LatLng'
        serviceType:
          type: string
          enum: [STANDARD, PREMIUM]
        couponCode:
          type: string
    LatLng:
      type: object
      required: [lat, lng]
      properties:
        lat:
          type: number
          minimum: -90
          maximum: 90
        lng:
          type: number
          minimum: -180
          maximum: 180
    QuoteData:
      type: object
      properties:
        quoteId:
          type: string
          format: uuid
        estimatedFare:
          type: number
        currency:
          type: string
        distanceKm:
          type: number
        durationMin:
          type: number
        breakdown:
          $ref: '#/components/schemas/FareBreakdown'
        expiresAt:
          type: string
          format: date-time
    FareBreakdown:
      type: object
      properties:
        base:
          type: number
        perKm:
          type: number
        perMin:
          type: number
        discount:
          type: number
        surge:
          type: number
    QuoteResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        data:
          $ref: '#/components/schemas/QuoteData'
        meta:
          $ref: '#/components/schemas/ResponseMeta'
    FinalizeRequest:
      type: object
      required: [quoteId]
      properties:
        quoteId:
          type: string
          format: uuid
        actualDistanceKm:
          type: number
        actualDurationMin:
          type: number
    FinalizeData:
      type: object
      properties:
        quoteId:
          type: string
          format: uuid
        finalFare:
          type: number
        currency:
          type: string
        distanceKm:
          type: number
        durationMin:
          type: number
        breakdown:
          $ref: '#/components/schemas/FareBreakdown'
    FinalizeResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        data:
          $ref: '#/components/schemas/FinalizeData'
        meta:
          $ref: '#/components/schemas/ResponseMeta'
    ResponseMeta:
      type: object
      properties:
        requestId:
          type: string
        traceId:
          type: string
    ErrorResponse:
      type: object
      properties:
        success:
          type: boolean
          example: false
        error:
          type: object
          properties:
            code:
              type: string
            message:
              type: string
            details:
              type: object
            traceId:
              type: string
