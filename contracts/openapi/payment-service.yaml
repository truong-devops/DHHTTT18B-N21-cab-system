openapi: 3.0.3
info:
  title: payment-service
  version: 0.1.0
paths:
  /v1/payments:
    get:
      summary: List payments
      parameters:
        - in: query
          name: limit
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
        - in: query
          name: cursor
          schema:
            type: string
            description: base64("<createdAt>|<id>")
        - in: query
          name: sort
          schema:
            type: string
            default: -createdAt
            enum: [createdAt, -createdAt]
        - in: query
          name: status
          schema:
            type: string
            enum: [INITIATED, PROCESSING, PAID, FAILED, REFUNDED]
        - in: query
          name: rideId
          schema:
            type: string
      responses:
        '200':
          description: Payment list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaymentListResponse'
        '400':
          description: Invalid query
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    post:
      summary: Create payment
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PaymentCreateRequest'
      responses:
        '201':
          description: Payment created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaymentResponse'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Idempotency conflict
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /v1/payments/{id}:
    get:
      summary: Get payment by id
      parameters:
        - $ref: '#/components/parameters/PaymentId'
      responses:
        '200':
          description: Payment
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaymentResponse'
        '404':
          description: Not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    patch:
      summary: Update payment status
      parameters:
        - $ref: '#/components/parameters/PaymentId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PaymentStatusUpdate'
      responses:
        '200':
          description: Payment
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaymentResponse'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Invalid status transition
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /v1/payments/{id}/vietqr-codes:
    get:
      summary: Get VietQR data for a payment
      parameters:
        - $ref: '#/components/parameters/PaymentId'
      responses:
        '200':
          description: VietQR data
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VietQrResponse'
        '404':
          description: Not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: VietQR not available
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
components:
  parameters:
    IdempotencyKey:
      name: Idempotency-Key
      in: header
      required: true
      schema:
        type: string
    PaymentId:
      name: id
      in: path
      required: true
      schema:
        type: string
  schemas:
    Payment:
      type: object
      required:
        - id
        - rideId
        - amount
        - currency
        - status
        - statusUpdatedAt
        - createdAt
        - updatedAt
      properties:
        id:
          type: string
        rideId:
          type: string
        userId:
          type: string
        amount:
          type: string
          pattern: "^\\d+(\\.\\d{1,2})?$"
        currency:
          type: string
          minLength: 3
          maxLength: 3
        method:
          type: string
        status:
          type: string
          enum: [INITIATED, PROCESSING, PAID, FAILED, REFUNDED]
        statusUpdatedAt:
          type: string
          format: date-time
        failureReason:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        vietqr:
          $ref: '#/components/schemas/VietQrData'
        payos:
          $ref: '#/components/schemas/PayosData'
    VietQrData:
      type: object
      properties:
        payload:
          type: string
        qrUrl:
          type: string
        reference:
          type: string
        expiresAt:
          type: string
          format: date-time
    PayosData:
      type: object
      properties:
        orderCode:
          type: string
        paymentLinkId:
          type: string
        checkoutUrl:
          type: string
        qrCode:
          type: string
    PaymentCreateRequest:
      type: object
      required:
        - rideId
        - amount
        - currency
      properties:
        rideId:
          type: string
        amount:
          oneOf:
            - type: string
              pattern: "^\\d+(\\.\\d{1,2})?$"
            - type: number
              minimum: 0.01
        currency:
          type: string
          minLength: 3
          maxLength: 3
        method:
          type: string
        userId:
          type: string
        note:
          type: string
    PaymentStatusUpdate:
      type: object
      required:
        - status
      properties:
        status:
          type: string
          enum: [INITIATED, PROCESSING, PAID, FAILED, REFUNDED]
        failureReason:
          type: string
    PaymentResponse:
      type: object
      properties:
        data:
          $ref: '#/components/schemas/Payment'
    PaymentListResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/Payment'
        nextCursor:
          type: string
    VietQrResponse:
      type: object
      properties:
        data:
          type: object
          properties:
            paymentId:
              type: string
            rideId:
              type: string
            amount:
              type: string
              pattern: "^\\d+(\\.\\d{1,2})?$"
            currency:
              type: string
            vietqr:
              $ref: '#/components/schemas/VietQrData'
    ErrorResponse:
      type: object
      properties:
        error:
          type: object
          properties:
            code:
              type: string
            message:
              type: string
            details:
              type: array
              items:
                type: string
        traceId:
          type: string
