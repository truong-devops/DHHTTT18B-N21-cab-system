    post:
      summary: Proxy POST to upstream service
      parameters:
        - $ref: "#/components/parameters/DomainParam"
        - $ref: "#/components/parameters/ProxyPathParam"
        - $ref: "#/components/parameters/IdempotencyKeyHeader"
      responses:
        "200":
          description: Proxied response
          content:
            application/json:
              schema:
