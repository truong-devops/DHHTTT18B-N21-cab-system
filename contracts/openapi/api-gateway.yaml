          $ref: "#/components/responses/ErrorResponse"
    delete:
      summary: Proxy DELETE to upstream service
      parameters:
        - $ref: "#/components/parameters/DomainParam"
        - $ref: "#/components/parameters/ProxyPathParam"
      responses:
        "200":
          description: Proxied response
          content:
            application/json:
              schema:
                type: object
        "400":
          $ref: "#/components/responses/ErrorResponse"
        "401":
          $ref: "#/components/responses/ErrorResponse"
        "403":
          $ref: "#/components/responses/ErrorResponse"
        "404":
          $ref: "#/components/responses/ErrorResponse"
        "409":
          $ref: "#/components/responses/ErrorResponse"
        "429":
          $ref: "#/components/responses/ErrorResponse"
        "500":
          $ref: "#/components/responses/ErrorResponse"
components:
  parameters:
    DomainParam:
      name: domain
      in: path
      required: true
      schema:
        type: string
      description: Upstream service domain segment.
    ProxyPathParam:
      name: proxyPath
      in: path
      required: true
      schema:
        type: string
      description: Remaining upstream path.
      allowReserved: true
    IdempotencyKeyHeader:
      name: Idempotency-Key
      in: header
      required: true
      schema:
        type: string
      description: Idempotency key for POST requests.
    LimitParam:
      name: limit
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
        maximum: 100
    CursorParam:
      name: cursor
      in: query
      required: false
      schema:
        type: string
    SortParam:
      name: sort
      in: query
      required: false
      schema:
        type: string
    IdParam:
      name: id
      in: path
      required: true
      schema:
        type: string
  responses:
    ErrorResponse:
      description: Error response
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
  schemas:
    HealthResponse:
      type: object
      required:
        - ok
      properties:
        ok:
          type: boolean
    ErrorResponse:
      type: object
      required:
        - error
        - traceId
      properties:
        error:
          $ref: "#/components/schemas/ErrorObject"
        traceId:
          type: string
    ErrorObject:
      type: object
      required:
        - code
        - message
        - details
      properties:
        code:
          type: string
        message:
          type: string
        details:
          type: array
          items:
            type: object
