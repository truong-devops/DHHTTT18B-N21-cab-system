services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.1
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      - backend

  kafka:
    image: confluentinc/cp-kafka:7.6.1
    depends_on:
      - zookeeper
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: "zookeeper:2181"
      KAFKA_LISTENERS: "PLAINTEXT://0.0.0.0:9092"
      KAFKA_ADVERTISED_LISTENERS: "PLAINTEXT://kafka:9092"
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "PLAINTEXT:PLAINTEXT"
      KAFKA_INTER_BROKER_LISTENER_NAME: "PLAINTEXT"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
    networks:
      - backend

  redis:
    image: redis:7-alpine
    volumes:
      - cab_redis_data:/data
    networks:
      - backend

  api-gateway:
    build:
      context: ..
      dockerfile: services/api-gateway/Dockerfile
    ports:
      - "3000:3000"
    environment:
      SERVICE_NAME: api-gateway
      OTEL_SERVICE_NAME: api-gateway
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-http://otel-collector:4318}
      JWT_SECRET: ${JWT_SECRET:-dev-secret}
      AUTH_SERVICE_URL: http://auth-service:4001
      BOOKING_SERVICE_URL: http://booking-service:3003
      DRIVER_SERVICE_URL: http://driver-service:3011
      NOTIFICATION_SERVICE_URL: http://notification-service:3010
      PAYMENT_SERVICE_URL: http://payment-service:3007
      PRICING_SERVICE_URL: http://pricing-service:3006
      RIDE_SERVICE_URL: http://ride-service:3005
      REVIEW_SERVICE_URL: http://review-service:3009
      USER_SERVICE_URL: http://user-service:4004
    depends_on:
      - auth-service
      - booking-service
      - driver-service
      - notification-service
      - payment-service
      - pricing-service
      - ride-service
      - review-service
      - user-service
    networks:
      - backend

  auth-service:
    build:
      context: ..
      dockerfile: services/auth-service/Dockerfile
    environment:
      SERVICE_NAME: auth-service
      OTEL_SERVICE_NAME: auth-service
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-http://otel-collector:4318}
      PORT: 4001
      DATABASE_URL: postgres://cab:cabpass@postgres:5432/auth-service_db
      JWT_SECRET: ${JWT_SECRET:-dev-secret}
    depends_on:
      - postgres
    networks:
      - backend

  user-service:
    build:
      context: ..
      dockerfile: services/user-service/Dockerfile
    environment:
      SERVICE_NAME: user-service
      OTEL_SERVICE_NAME: user-service
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-http://otel-collector:4318}
      PORT: 4004
      DATABASE_URL: postgres://cab:cabpass@postgres:5432/user-service_db
      INTERNAL_API_KEY: ${INTERNAL_API_KEY:-dev-internal-key}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    depends_on:
      - postgres
    networks:
      - backend

  ride-service:
    build:
      context: ..
      dockerfile: services/ride-service/Dockerfile
    environment:
      SERVICE_NAME: ride-service
      OTEL_SERVICE_NAME: ride-service
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-http://otel-collector:4318}
      PORT: 3005
      MONGODB_URI: mongodb://mongo:27017/ride_service
      REDIS_URL: redis://redis:6379
      KAFKA_BROKERS: kafka:9092
      JWT_SECRET: ${JWT_SECRET:-dev-secret}
    depends_on:
      - mongo
      - redis
      - kafka
    networks:
      - backend

  booking-service:
    build:
      context: ../services/booking-service
    environment:
      SERVICE_NAME: booking-service
      OTEL_SERVICE_NAME: booking-service
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-http://otel-collector:4318}
      PORT: 3003
      KAFKA_BROKERS: kafka:9092
      PRICING_BASE_URL: http://pricing-service:3006
      INTERNAL_API_KEY: ${INTERNAL_API_KEY:-dev-internal-key}
    depends_on:
      - kafka
    networks:
      - backend

  driver-service:
    build:
      context: ..
      dockerfile: services/driver-service/Dockerfile
    environment:
      SERVICE_NAME: driver-service
      OTEL_SERVICE_NAME: driver-service
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-http://otel-collector:4318}
      PORT: 3011
      DATABASE_URL: postgres://cab:cabpass@postgres:5432/driver-service_db
      REDIS_URL: redis://redis:6379
      AUTH_JWT_SECRET: ${JWT_SECRET:-dev-secret}
    depends_on:
      - postgres
      - redis
    networks:
      - backend

  notification-service:
    build:
      context: ../services/notification-service
    environment:
      SERVICE_NAME: notification-service
      OTEL_SERVICE_NAME: notification-service
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-http://otel-collector:4318}
      PORT: 3010
      MONGODB_URI: mongodb://mongo:27017/notification_service
      USER_SERVICE_BASE_URL: http://user-service:4004
      INTERNAL_API_KEY: ${INTERNAL_API_KEY:-dev-internal-key}
      AUTH_JWT_SECRET: ${JWT_SECRET:-dev-secret}
    depends_on:
      - mongo
      - user-service
    networks:
      - backend

  pricing-service:
    build:
      context: ..
      dockerfile: services/pricing-service/Dockerfile
    environment:
      SERVICE_NAME: pricing-service
      OTEL_SERVICE_NAME: pricing-service
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-http://otel-collector:4318}
      PORT: 3006
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:-dev-secret}
      INTERNAL_API_KEY: ${INTERNAL_API_KEY:-dev-internal-key}
      COUPON_DISCOUNTS_JSON: '{"WELCOME10":10000,"VIP20":20000,"OFF50":50000}'
      RATES_JSON: '{"STANDARD":{"surgeMultiplier":1.1},"PREMIUM":{"surgeMultiplier":1.3}}'
    depends_on:
      - redis
    networks:
      - backend

  payment-service:
    build:
      context: ..
      dockerfile: services/payment-service/Dockerfile
    environment:
      SERVICE_NAME: payment-service
      OTEL_SERVICE_NAME: payment-service
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-http://otel-collector:4318}
      PORT: 3007
      DATABASE_URL: postgres://cab:cabpass@postgres:5432/payment-service_db
      REDIS_URL: redis://redis:6379
      KAFKA_BROKERS: kafka:9092
      JWT_ACCESS_SECRET: ${JWT_SECRET:-dev-secret}

      VIETQR_BANK_BIN: "970418"
      VIETQR_ACCOUNT_NUMBER: "123456789"
      VIETQR_ACCOUNT_NAME: "NGUYEN VAN A"
      VIETQR_CLIENT_ID: "your-client-id"
      VIETQR_API_KEY: "your-api-key"
      VIETQR_EXPIRES_IN_MINUTES: 15
      PAYOS_API_URL: ${PAYOS_API_URL:-https://api-merchant.payos.vn}
      PAYOS_CLIENT_ID: ${PAYOS_CLIENT_ID:-}
      PAYOS_API_KEY: ${PAYOS_API_KEY:-}
      PAYOS_CHECKSUM_KEY: ${PAYOS_CHECKSUM_KEY:-}
      PAYOS_PARTNER_CODE: ${PAYOS_PARTNER_CODE:-}
      PAYOS_RETURN_URL: ${PAYOS_RETURN_URL:-}
      PAYOS_CANCEL_URL: ${PAYOS_CANCEL_URL:-}
    depends_on:
      - postgres
      - redis
      - kafka
    networks:
      - backend

  review-service:
    build:
      context: ..
      dockerfile: services/review-service/Dockerfile
    environment:
      SERVICE_NAME: review-service
      OTEL_SERVICE_NAME: review-service
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-http://otel-collector:4318}
      PORT: 3009
      DATABASE_URL: postgres://cab:cabpass@postgres:5432/review-service_db
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:-dev-secret}
    depends_on:
      - postgres
      - redis
    networks:
      - backend

  # =========================
  # Infra: Postgres (demo future)
  # =========================
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: cab
      POSTGRES_PASSWORD: cabpass
      POSTGRES_DB: cab_booking
    volumes:
      - cab_postgres_data:/var/lib/postgresql/data
      - ./postgres/init:/docker-entrypoint-initdb.d
    networks:
      - backend

  pgadmin:
    image: dpage/pgadmin4:8
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@example.com
      PGADMIN_DEFAULT_PASSWORD: admin123
    ports:
      - "5050:80"
    volumes:
      - cab_pgadmin_data:/var/lib/pgadmin
    depends_on:
      - postgres
    networks:
      - backend

  mongo:
    image: mongo:7
    volumes:
      - cab_mongo_data:/data/db
      - ./mongo/init:/docker-entrypoint-initdb.d
    networks:
      - backend

volumes:
  cab_postgres_data:
  cab_pgadmin_data:
  cab_redis_data:
  cab_mongo_data:

networks:
  backend:
    driver: bridge
