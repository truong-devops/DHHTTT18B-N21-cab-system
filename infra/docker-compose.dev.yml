services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.1
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      - backend

  kafka:
    image: confluentinc/cp-kafka:7.6.1
    depends_on:
      - zookeeper
    environment:
      KAFKA_BROKER_ID: ${KAFKA_SINGLE_BROKER_ID:-1}
      KAFKA_ZOOKEEPER_CONNECT: 'zookeeper:2181'
      KAFKA_LISTENERS: 'PLAINTEXT://0.0.0.0:9092'
      KAFKA_ADVERTISED_LISTENERS: 'PLAINTEXT://kafka:9092'
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: 'PLAINTEXT:PLAINTEXT'
      KAFKA_INTER_BROKER_LISTENER_NAME: 'PLAINTEXT'
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: ${KAFKA_INTERNAL_TOPIC_RF:-1}
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: ${KAFKA_INTERNAL_TOPIC_MIN_ISR:-1}
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: ${KAFKA_INTERNAL_TOPIC_RF:-1}
      KAFKA_DEFAULT_REPLICATION_FACTOR: ${KAFKA_TOPIC_RF:-1}
      KAFKA_MIN_INSYNC_REPLICAS: ${KAFKA_TOPIC_MIN_ISR:-1}
      KAFKA_NUM_PARTITIONS: ${KAFKA_TOPIC_DEFAULT_PARTITIONS:-3}
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: ${KAFKA_AUTO_CREATE_TOPICS_ENABLE:-true}
    networks:
      - backend

  redis:
    image: redis:7-alpine
    volumes:
      - cab_redis_data:/data
    networks:
      - backend

  api-gateway:
    build:
      context: ..
      dockerfile: services/api-gateway/Dockerfile
    ports:
      - '3000:3000'
      - '3443:3443'
    environment:
      SERVICE_NAME: api-gateway
      OTEL_SERVICE_NAME: api-gateway
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-http://otel-collector:4318}
      JWT_SECRET: ${JWT_SECRET:-dev-secret}
      INTERNAL_API_KEY: ${INTERNAL_API_KEY:-dev-internal-key}
      AUTH_SERVICE_URL: http://auth-service:4001
      BOOKING_SERVICE_URL: http://booking-service:3003
      DRIVER_SERVICE_URL: http://driver-service:3011
      ETA_SERVICE_URL: http://eta-service:3012
      PLACES_SERVICE_URL: http://places-service:3014
      NOTIFICATION_SERVICE_URL: http://notification-service:3010
      PAYMENT_SERVICE_URL: http://payment-service:3007
      PRICING_SERVICE_URL: http://pricing-service:3006
      AI_SERVICE_URL: http://ai-service:3013
      RIDE_SERVICE_URL: http://ride-service:3005
      REVIEW_SERVICE_URL: http://review-service:3009
      USER_SERVICE_URL: http://user-service:4004
      PROXY_TIMEOUT_MS: 30000
      PROXY_TIMEOUT_MS_PRICING: 1200
      PROXY_RETRY_BACKOFF_MS: 100
      PROXY_CIRCUIT_BREAKER_FAILURE_THRESHOLD: 6
      PROXY_CIRCUIT_BREAKER_OPEN_MS: 4000
      PROXY_CIRCUIT_BREAKER_FAILURE_THRESHOLD_PRICING: 2
      PROXY_CIRCUIT_BREAKER_OPEN_MS_PRICING: 6000
      PROXY_CIRCUIT_BREAKER_FAILURE_THRESHOLD_BOOKINGS: 20
      PROXY_CIRCUIT_BREAKER_OPEN_MS_BOOKINGS: 1500
      GATEWAY_HTTPS_ENABLED: ${GATEWAY_HTTPS_ENABLED:-true}
      HTTPS_PORT: ${HTTPS_PORT:-3443}
      HTTPS_CERT_PATH: ${HTTPS_CERT_PATH:-/app/src/certs/dev-gateway.crt}
      HTTPS_KEY_PATH: ${HTTPS_KEY_PATH:-/app/src/certs/dev-gateway.key}
    depends_on:
      - auth-service
      - booking-service
      - driver-service
      - eta-service
      - places-service
      - notification-service
      - payment-service
      - pricing-service
      - ai-service
      - ride-service
      - review-service
      - user-service
    networks:
      - backend

  auth-service:
    build:
      context: ..
      dockerfile: services/auth-service/Dockerfile
    environment:
      SERVICE_NAME: auth-service
      OTEL_SERVICE_NAME: auth-service
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-http://otel-collector:4318}
      PORT: 4001
      DATABASE_URL: postgres://cab:cabpass@postgres:5432/auth-service_db
      JWT_SECRET: ${JWT_SECRET:-dev-secret}
    depends_on:
      - postgres
    networks:
      - backend

  user-service:
    build:
      context: ..
      dockerfile: services/user-service/Dockerfile
    environment:
      SERVICE_NAME: user-service
      OTEL_SERVICE_NAME: user-service
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-http://otel-collector:4318}
      PORT: 4004
      DATABASE_URL: postgres://cab:cabpass@postgres:5432/user-service_db
      INTERNAL_API_KEY: ${INTERNAL_API_KEY:-dev-internal-key}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    depends_on:
      - postgres
    networks:
      - backend

  ride-service:
    build:
      context: ..
      dockerfile: services/ride-service/Dockerfile
    environment:
      SERVICE_NAME: ride-service
      OTEL_SERVICE_NAME: ride-service
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-http://otel-collector:4318}
      PORT: 3005
      AUTO_ASSIGN_DRIVER: 'false'
      MONGODB_URI: mongodb://mongo:27017/ride_service
      REDIS_URL: redis://redis:6379
      KAFKA_BROKERS: ${KAFKA_BROKERS:-kafka:9092}
      KAFKA_CONSUMER_GROUP_ID: ride-service-group
      KAFKA_CONSUMER_PARTITIONS_CONCURRENCY: 1
      KAFKA_CONSUMER_MAX_MESSAGES_PER_BATCH: 100
      KAFKA_CONSUMER_AUTO_COMMIT_INTERVAL_MS: 1000
      KAFKA_CONSUMER_AUTO_COMMIT_THRESHOLD: 1
      KAFKA_CONSUMER_SESSION_TIMEOUT_MS: 30000
      KAFKA_CONSUMER_HEARTBEAT_INTERVAL_MS: 3000
      KAFKA_CONSUMER_REBALANCE_TIMEOUT_MS: 60000
      KAFKA_CONSUMER_MAX_BYTES_PER_PARTITION: 1048576
      KAFKA_CONSUMER_MIN_BYTES: 1
      KAFKA_CONSUMER_MAX_BYTES: 10485760
      KAFKA_CONSUMER_MAX_WAIT_MS: 5000
      KAFKA_CONSUMER_RETRY_RETRIES: 8
      KAFKA_CONSUMER_RETRY_INITIAL_MS: 300
      KAFKA_CONSUMER_RETRY_MAX_MS: 30000
      KAFKA_PRODUCER_ACKS: -1
      KAFKA_PRODUCER_REQUEST_TIMEOUT_MS: 30000
      KAFKA_PRODUCER_MAX_IN_FLIGHT_REQUESTS: 5
      KAFKA_PRODUCER_RETRY_RETRIES: 8
      KAFKA_PRODUCER_RETRY_INITIAL_MS: 300
      KAFKA_PRODUCER_RETRY_MAX_MS: 30000
      OUTBOX_PUBLISH_INTERVAL_MS: 5000
      OUTBOX_PUBLISH_BATCH_SIZE: 50
      OUTBOX_MAX_ATTEMPTS: 10
      OUTBOX_RETRY_BASE_MS: 1000
      OUTBOX_RETRY_MAX_MS: 60000
      OUTBOX_PROCESSING_TIMEOUT_MS: 300000
      INBOX_MAX_ATTEMPTS: 10
      INBOX_RETRY_BASE_MS: 1000
      INBOX_RETRY_MAX_MS: 60000
      INBOX_PROCESSING_TIMEOUT_MS: 300000
      JWT_SECRET: ${JWT_SECRET:-dev-secret}
    depends_on:
      - mongo
      - redis
      - kafka
    networks:
      - backend

  booking-service:
    build:
      context: ..
      dockerfile: services/booking-service/Dockerfile
    ports:
      - '3003:3003'
    environment:
      SERVICE_NAME: booking-service
      OTEL_SERVICE_NAME: booking-service
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-http://otel-collector:4318}
      PORT: 3003
      JWT_SECRET: ${JWT_SECRET:-dev-secret}
      DATABASE_URL: postgres://cab:cabpass@postgres:5432/booking-service_db
      PGPOOL_MAX: ${BOOKING_PGPOOL_MAX:-60}
      PGPOOL_MIN: ${BOOKING_PGPOOL_MIN:-5}
      PGPOOL_IDLE_TIMEOUT_MS: ${BOOKING_PGPOOL_IDLE_TIMEOUT_MS:-10000}
      PGPOOL_CONNECTION_TIMEOUT_MS: ${BOOKING_PGPOOL_CONNECTION_TIMEOUT_MS:-5000}
      BOOKING_LOAD_SKIP_PERSIST: ${BOOKING_LOAD_SKIP_PERSIST:-true}
      BOOKING_LOAD_SKIP_LIST_DB: ${BOOKING_LOAD_SKIP_LIST_DB:-true}
      KAFKA_BROKERS: ${KAFKA_BROKERS:-kafka:9092}
      KAFKA_CONSUME_TOPICS: payment.completed,payment.failed
      KAFKA_CONSUMER_GROUP_ID: booking-service-group
      KAFKA_CONSUMER_PARTITIONS_CONCURRENCY: 1
      KAFKA_CONSUMER_MAX_MESSAGES_PER_BATCH: 100
      KAFKA_CONSUMER_MAX_BYTES_PER_PARTITION: 1048576
      KAFKA_CONSUMER_MIN_BYTES: 1
      KAFKA_CONSUMER_MAX_BYTES: 10485760
      KAFKA_CONSUMER_MAX_WAIT_MS: 5000
      KAFKA_CONSUMER_SESSION_TIMEOUT_MS: 30000
      KAFKA_CONSUMER_HEARTBEAT_INTERVAL_MS: 3000
      KAFKA_CONSUMER_REBALANCE_TIMEOUT_MS: 60000
      KAFKA_CONSUMER_AUTO_COMMIT_INTERVAL_MS: 1000
      KAFKA_CONSUMER_AUTO_COMMIT_THRESHOLD: 1
      KAFKA_CONSUMER_RETRY_RETRIES: 8
      KAFKA_CONSUMER_RETRY_INITIAL_MS: 300
      KAFKA_CONSUMER_RETRY_MAX_MS: 30000
      KAFKA_REQUEST_TIMEOUT_MS: 60000
      KAFKA_CONNECTION_TIMEOUT_MS: 10000
      KAFKA_PRODUCER_ACKS: -1
      KAFKA_PRODUCER_REQUEST_TIMEOUT_MS: 30000
      KAFKA_PRODUCER_MAX_IN_FLIGHT_REQUESTS: 5
      KAFKA_PRODUCER_RETRY_RETRIES: 8
      KAFKA_PRODUCER_RETRY_INITIAL_MS: 300
      KAFKA_PRODUCER_RETRY_MAX_MS: 30000
      OUTBOX_PUBLISH_INTERVAL_MS: 3000
      OUTBOX_PUBLISH_BATCH_SIZE: 50
      OUTBOX_MAX_ATTEMPTS: 10
      OUTBOX_RETRY_BASE_MS: 1000
      OUTBOX_RETRY_MAX_MS: 60000
      OUTBOX_PROCESSING_TIMEOUT_MS: 300000
      ETA_BASE_URL: http://eta-service:3012
      PRICING_BASE_URL: http://pricing-service:3006
      AI_BASE_URL: http://ai-service:3013
      PAYMENT_BASE_URL: ${PAYMENT_BASE_URL:-http://payment-service:3007}
      PAYMENT_FALLBACK_BASE_URLS: ${PAYMENT_FALLBACK_BASE_URLS:-}
      PAYMENT_IP_FAMILY: 4
      PAYMENT_REQUEST_TIMEOUT_MS: 2500
      PAYMENT_HTTP_RETRY_MAX: 0
      PAYMENT_HTTP_RETRY_BACKOFF_MS: 150
      BOOKING_CASH_PAYMENT_INIT_MODE: ${BOOKING_CASH_PAYMENT_INIT_MODE:-strict}
      INTERNAL_API_KEY: ${INTERNAL_API_KEY:-dev-internal-key}
    depends_on:
      - kafka
      - postgres
      - eta-service
      - ai-service
    networks:
      - backend

  eta-service:
    build:
      context: ..
      dockerfile: services/eta-service/Dockerfile
    ports:
      - '3012:3012'
    environment:
      SERVICE_NAME: eta-service
      OTEL_SERVICE_NAME: eta-service
      PORT: 3012
    networks:
      - backend

  places-service:
    build:
      context: ..
      dockerfile: services/places-service/Dockerfile
    ports:
      - '3014:3014'
    environment:
      SERVICE_NAME: places-service
      OTEL_SERVICE_NAME: places-service
      PORT: 3014
      DATABASE_URL: postgres://cab:cabpass@postgres:5432/places-service_db
      PLACES_PROVIDER_ENABLED: ${PLACES_PROVIDER_ENABLED:-true}
      PLACES_PROVIDER_BASE_URL: ${PLACES_PROVIDER_BASE_URL:-https://nominatim.openstreetmap.org}
      PLACES_PROVIDER_TIMEOUT_MS: ${PLACES_PROVIDER_TIMEOUT_MS:-1800}
      PLACES_PROVIDER_COUNTRY_CODES: ${PLACES_PROVIDER_COUNTRY_CODES:-vn}
    depends_on:
      - postgres
    networks:
      - backend

  ai-service:
    build:
      context: ..
      dockerfile: services/ai-service/Dockerfile
    ports:
      - '3013:3013'
    environment:
      SERVICE_NAME: ai-service
      OTEL_SERVICE_NAME: ai-service
      PORT: 3013
    networks:
      - backend

  driver-service:
    build:
      context: ..
      dockerfile: services/driver-service/Dockerfile
    ports:
      - '3011:3011'
    environment:
      SERVICE_NAME: driver-service
      OTEL_SERVICE_NAME: driver-service
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-http://otel-collector:4318}
      PORT: 3011
      DATABASE_URL: postgres://cab:cabpass@postgres:5432/driver-service_db
      REDIS_URL: redis://redis:6379
      AUTH_JWT_SECRET: ${JWT_SECRET:-dev-secret}
      # Allow higher GPS update frequency from driver app
      MAX_LOCATION_RATE_PER_SEC: ${MAX_LOCATION_RATE_PER_SEC:-5}
    depends_on:
      - postgres
      - redis
    networks:
      - backend

  notification-service:
    build:
      context: ..
      dockerfile: services/notification-service/Dockerfile
    environment:
      SERVICE_NAME: notification-service
      OTEL_SERVICE_NAME: notification-service
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-http://otel-collector:4318}
      PORT: 3010
      MONGODB_URI: mongodb://mongo:27017/notification_service
      USER_SERVICE_BASE_URL: http://user-service:4004
      INTERNAL_API_KEY: ${INTERNAL_API_KEY:-dev-internal-key}
      AUTH_JWT_SECRET: ${JWT_SECRET:-dev-secret}
    depends_on:
      - mongo
      - user-service
    networks:
      - backend

  pricing-service:
    build:
      context: ..
      dockerfile: services/pricing-service/Dockerfile
    ports:
      - '3006:3006'
    environment:
      SERVICE_NAME: pricing-service
      OTEL_SERVICE_NAME: pricing-service
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-http://otel-collector:4318}
      PORT: 3006
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:-dev-secret}
      INTERNAL_API_KEY: ${INTERNAL_API_KEY:-dev-internal-key}
      COUPON_DISCOUNTS_JSON: '{"WELCOME10":10000,"VIP20":20000,"OFF50":50000}'
      RATES_JSON: '{"STANDARD":{"surgeMultiplier":1.1},"PREMIUM":{"surgeMultiplier":1.3}}'
    depends_on:
      - redis
    networks:
      - backend

  payment-service:
    build:
      context: ..
      dockerfile: services/payment-service/Dockerfile
    ports:
      - '3007:3007'
    environment:
      SERVICE_NAME: payment-service
      OTEL_SERVICE_NAME: payment-service
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-http://otel-collector:4318}
      PORT: 3007
      DATABASE_URL: postgres://cab:cabpass@postgres:5432/payment-service_db
      PGPOOL_MAX: ${PAYMENT_PGPOOL_MAX:-30}
      REDIS_URL: redis://redis:6379
      INTERNAL_API_KEY: ${INTERNAL_API_KEY:-dev-internal-key}
      KAFKA_BROKERS: ${KAFKA_BROKERS:-kafka:9092}
      KAFKA_CONSUME_TOPICS: ride.created,ride.assigned,ride.cancelled
      KAFKA_CONSUMER_GROUP_ID: payment-service-group
      KAFKA_CONSUMER_PARTITIONS_CONCURRENCY: ${PAYMENT_KAFKA_CONSUMER_PARTITIONS_CONCURRENCY:-3}
      KAFKA_CONSUMER_MAX_MESSAGES_PER_BATCH: 100
      KAFKA_CONSUMER_AUTO_COMMIT_INTERVAL_MS: 1000
      KAFKA_CONSUMER_AUTO_COMMIT_THRESHOLD: 1
      KAFKA_CONSUMER_SESSION_TIMEOUT_MS: 30000
      KAFKA_CONSUMER_HEARTBEAT_INTERVAL_MS: 3000
      KAFKA_CONSUMER_REBALANCE_TIMEOUT_MS: 60000
      KAFKA_CONSUMER_MAX_BYTES_PER_PARTITION: 1048576
      KAFKA_CONSUMER_MIN_BYTES: 1
      KAFKA_CONSUMER_MAX_BYTES: 10485760
      KAFKA_CONSUMER_MAX_WAIT_MS: 5000
      KAFKA_CONSUMER_RETRY_RETRIES: 8
      KAFKA_CONSUMER_RETRY_INITIAL_MS: 300
      KAFKA_CONSUMER_RETRY_MAX_MS: 30000
      KAFKA_PRODUCER_ACKS: -1
      KAFKA_PRODUCER_REQUEST_TIMEOUT_MS: 30000
      KAFKA_PRODUCER_MAX_IN_FLIGHT_REQUESTS: 5
      KAFKA_PRODUCER_RETRY_RETRIES: 8
      KAFKA_PRODUCER_RETRY_INITIAL_MS: 300
      KAFKA_PRODUCER_RETRY_MAX_MS: 30000
      OUTBOX_PUBLISH_INTERVAL_MS: 5000
      OUTBOX_PUBLISH_BATCH_SIZE: 50
      OUTBOX_MAX_ATTEMPTS: 10
      OUTBOX_RETRY_BASE_MS: 1000
      OUTBOX_RETRY_MAX_MS: 60000
      OUTBOX_PROCESSING_TIMEOUT_MS: 300000
      JWT_ACCESS_SECRET: ${JWT_SECRET:-dev-secret}

      VIETQR_API_URL: ${VIETQR_API_URL:-https://api.vietqr.io/v2/generate}
      VIETQR_BANK_BIN: ${VIETQR_BANK_BIN:-970418}
      VIETQR_ACCOUNT_NUMBER: ${VIETQR_ACCOUNT_NUMBER:-123456789}
      VIETQR_ACCOUNT_NAME: '${VIETQR_ACCOUNT_NAME:-NGUYEN VAN A}'
      VIETQR_MERCHANT_CITY: '${VIETQR_MERCHANT_CITY:-HO CHI MINH}'
      VIETQR_FORMAT: ${VIETQR_FORMAT:-text}
      VIETQR_CLIENT_ID: ${VIETQR_CLIENT_ID:-}
      VIETQR_API_KEY: ${VIETQR_API_KEY:-}
      VIETQR_EXPIRES_IN_MINUTES: ${VIETQR_EXPIRES_IN_MINUTES:-15}
      PAYOS_API_URL: ${PAYOS_API_URL:-https://api-merchant.payos.vn}
      PAYOS_CLIENT_ID: ${PAYOS_CLIENT_ID:-}
      PAYOS_API_KEY: ${PAYOS_API_KEY:-}
      PAYOS_CHECKSUM_KEY: ${PAYOS_CHECKSUM_KEY:-}
      PAYOS_PARTNER_CODE: ${PAYOS_PARTNER_CODE:-}
      PAYOS_RETURN_URL: ${PAYOS_RETURN_URL:-http://localhost:5173/admin/payments?payos=success}
      PAYOS_CANCEL_URL: ${PAYOS_CANCEL_URL:-http://localhost:5173/admin/payments?payos=cancel}
      PAYOS_QR_SOURCE: ${PAYOS_QR_SOURCE:-PAYOS}
      PAYOS_AUTO_SYNC_ENABLED: ${PAYOS_AUTO_SYNC_ENABLED:-false}
      PAYOS_AUTO_SYNC_INTERVAL_MS: ${PAYOS_AUTO_SYNC_INTERVAL_MS:-15000}
      PAYOS_AUTO_SYNC_BATCH_SIZE: ${PAYOS_AUTO_SYNC_BATCH_SIZE:-20}
      BOOKING_SERVICE_URL: http://booking-service:3003
      PAYMENT_BOOKING_COMPENSATION_ON_FAILED: ${PAYMENT_BOOKING_COMPENSATION_ON_FAILED:-true}
      PAYMENT_BOOKING_COMPENSATION_PATH: /v1/bookings/internal/payment-failed-compensation
      PAYMENT_BOOKING_COMPENSATION_TIMEOUT_MS: ${PAYMENT_BOOKING_COMPENSATION_TIMEOUT_MS:-2500}
      PAYMENT_BOOKING_COMPENSATION_MAX_ATTEMPTS: ${PAYMENT_BOOKING_COMPENSATION_MAX_ATTEMPTS:-2}
      PAYMENT_BOOKING_COMPENSATION_RETRY_BACKOFF_MS: ${PAYMENT_BOOKING_COMPENSATION_RETRY_BACKOFF_MS:-200}
    depends_on:
      - postgres
      - redis
      - kafka
    networks:
      - backend

  review-service:
    build:
      context: ..
      dockerfile: services/review-service/Dockerfile
    environment:
      SERVICE_NAME: review-service
      OTEL_SERVICE_NAME: review-service
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-http://otel-collector:4318}
      PORT: 3009
      DATABASE_URL: postgres://cab:cabpass@postgres:5432/review-service_db
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:-dev-secret}
    depends_on:
      - postgres
      - redis
    networks:
      - backend

  # =========================
  # Infra: Postgres (demo future)
  # =========================
  postgres:
    image: postgres:16-alpine
    command:
      - postgres
      - -c
      - max_connections=${POSTGRES_MAX_CONNECTIONS:-300}
    environment:
      POSTGRES_USER: cab
      POSTGRES_PASSWORD: cabpass
      POSTGRES_DB: cab_booking
    volumes:
      - cab_postgres_data:/var/lib/postgresql/data
      - ./postgres/init:/docker-entrypoint-initdb.d
    networks:
      - backend

  # pgadmin:
  #   image: dpage/pgadmin4:8
  #   environment:
  #     PGADMIN_DEFAULT_EMAIL: admin@example.com
  #     PGADMIN_DEFAULT_PASSWORD: admin123
  #   ports:
  #     - '5050:80'
  #   volumes:
  #     - cab_pgadmin_data:/var/lib/pgadmin
  #   depends_on:
  #     - postgres
  #   networks:
  #     - backend

  mongo:
    image: mongo:7
    volumes:
      - cab_mongo_data:/data/db
      - ./mongo/init:/docker-entrypoint-initdb.d
    networks:
      - backend

volumes:
  cab_postgres_data:
  cab_pgadmin_data:
  cab_redis_data:
  cab_mongo_data:

networks:
  backend:
    driver: bridge
