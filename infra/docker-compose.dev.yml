services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.1
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      - backend

  kafka:
    image: confluentinc/cp-kafka:7.6.1
    depends_on:
      - zookeeper
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: "zookeeper:2181"
      KAFKA_LISTENERS: "PLAINTEXT://0.0.0.0:9092"
      KAFKA_ADVERTISED_LISTENERS: "PLAINTEXT://kafka:9092"
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "PLAINTEXT:PLAINTEXT"
      KAFKA_INTER_BROKER_LISTENER_NAME: "PLAINTEXT"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
    networks:
      - backend

  redis:
    image: redis:7-alpine
    volumes:
      - cab_redis_data:/data
    networks:
      - backend

  api-gateway:
    build:
      context: ../services/api-gateway
    ports:
      - "3000:3000"
    environment:
      SERVICE_NAME: api-gateway
      JWT_SECRET: ${JWT_SECRET:-dev-secret}
      AUTH_SERVICE_URL: http://auth-service:4001
      BOOKING_SERVICE_URL: http://booking-service:3003
      DRIVER_SERVICE_URL: http://driver-service:3011
      NOTIFICATION_SERVICE_URL: http://notification-service:3010
      PRICING_SERVICE_URL: http://pricing-service:3006
      RIDE_SERVICE_URL: http://ride-service:3005
      REVIEW_SERVICE_URL: http://review-service:3009
      USER_SERVICE_URL: http://user-service:4004
    depends_on:
      - auth-service
      - booking-service
      - driver-service
      - notification-service
      - pricing-service
      - ride-service
      - review-service
      - user-service
    networks:
      - backend

  auth-service:
    build:
      context: ../services/auth-service
    environment:
      SERVICE_NAME: auth-service
      PORT: 4001
      DATABASE_URL: postgres://cab:cabpass@postgres:5432/auth-service_db
      JWT_SECRET: ${JWT_SECRET:-dev-secret}
    depends_on:
      - postgres
    networks:
      - backend

  user-service:
    build:
      context: ../services/user-service
    environment:
      SERVICE_NAME: user-service
      PORT: 4004
      DATABASE_URL: postgres://cab:cabpass@postgres:5432/user-service_db
      INTERNAL_API_KEY: ${INTERNAL_API_KEY:-dev-internal-key}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    depends_on:
      - postgres
    networks:
      - backend

  ride-service:
    build:
      context: ..
      dockerfile: services/ride-service/Dockerfile
    environment:
      SERVICE_NAME: ride-service
      PORT: 3005
      MONGODB_URI: mongodb://mongo:27017/ride_service
      REDIS_URL: redis://redis:6379
      KAFKA_BROKERS: kafka:9092
      JWT_SECRET: ${JWT_SECRET:-dev-secret}
    depends_on:
      - mongo
      - redis
      - kafka
    networks:
      - backend

  booking-service:
    build:
      context: ../services/booking-service
    environment:
      SERVICE_NAME: booking-service
      PORT: 3003
      KAFKA_BROKERS: kafka:9092
      PRICING_BASE_URL: http://pricing-service:3006
      INTERNAL_API_KEY: ${INTERNAL_API_KEY:-dev-internal-key}
    depends_on:
      - kafka
    networks:
      - backend

  driver-service:
    build:
      context: ..
      dockerfile: services/driver-service/Dockerfile
    environment:
      SERVICE_NAME: driver-service
      PORT: 3011
      DATABASE_URL: postgres://cab:cabpass@postgres:5432/driver-service_db
      REDIS_URL: redis://redis:6379
      AUTH_JWT_SECRET: ${JWT_SECRET:-dev-secret}
    depends_on:
      - postgres
      - redis
    networks:
      - backend

  notification-service:
    build:
      context: ../services/notification-service
    environment:
      SERVICE_NAME: notification-service
      PORT: 3010
      MONGODB_URI: mongodb://mongo:27017/notification_service
      USER_SERVICE_BASE_URL: http://user-service:4004
      INTERNAL_API_KEY: ${INTERNAL_API_KEY:-dev-internal-key}
      AUTH_JWT_SECRET: ${JWT_SECRET:-dev-secret}
    depends_on:
      - mongo
      - user-service
    networks:
      - backend

  pricing-service:
    build:
      context: ..
      dockerfile: services/pricing-service/Dockerfile
    environment:
      SERVICE_NAME: pricing-service
      PORT: 3006
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:-dev-secret}
      INTERNAL_API_KEY: ${INTERNAL_API_KEY:-dev-internal-key}
    depends_on:
      - redis
    networks:
      - backend

  review-service:
    build:
      context: ..
      dockerfile: services/review-service/Dockerfile
    environment:
      SERVICE_NAME: review-service
      PORT: 3009
      DATABASE_URL: postgres://cab:cabpass@postgres:5432/review-service_db
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:-dev-secret}
    depends_on:
      - postgres
      - redis
    networks:
      - backend

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: cab
      POSTGRES_PASSWORD: cabpass
      POSTGRES_DB: cab_booking
    volumes:
      - cab_postgres_data:/var/lib/postgresql/data
      - ./postgres/init:/docker-entrypoint-initdb.d
    networks:
      - backend

  mongo:
    image: mongo:7
    volumes:
      - cab_mongo_data:/data/db
    networks:
      - backend

volumes:
  cab_postgres_data:
  cab_redis_data:
  cab_mongo_data:

networks:
  backend:
    driver: bridge
