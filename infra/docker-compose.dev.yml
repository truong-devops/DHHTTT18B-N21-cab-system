services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.1
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"

  kafka:
    image: confluentinc/cp-kafka:7.6.1
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
      - "29092:29092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: "zookeeper:2181"
      KAFKA_LISTENERS: "PLAINTEXT://0.0.0.0:9092,PLAINTEXT_HOST://0.0.0.0:29092"
      KAFKA_ADVERTISED_LISTENERS: "PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092"
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT"
      KAFKA_INTER_BROKER_LISTENER_NAME: "PLAINTEXT"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    depends_on:
      - kafka
    ports:
      - "8080:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  api-gateway:
    build:
      context: ../services/api-gateway
    ports:
      - "3000:3000"
    environment:
      SERVICE_NAME: api-gateway
      JWT_SECRET: ${JWT_SECRET:-dev-secret}
      RIDE_SERVICE_URL: ${RIDE_SERVICE_URL:-http://host.docker.internal:3005}
      USER_SERVICE_URL: ${USER_SERVICE_URL:-http://host.docker.internal:3002}
      DRIVER_SERVICE_URL: ${DRIVER_SERVICE_URL:-http://host.docker.internal:3003}
      BOOKING_SERVICE_URL: ${BOOKING_SERVICE_URL:-http://host.docker.internal:3004}
      PRICING_SERVICE_URL: ${PRICING_SERVICE_URL:-http://host.docker.internal:3006}
      PAYMENT_SERVICE_URL: ${PAYMENT_SERVICE_URL:-http://host.docker.internal:3007}
      REVIEW_SERVICE_URL: ${REVIEW_SERVICE_URL:-http://host.docker.internal:3009}
      AUTH_SERVICE_URL: ${AUTH_SERVICE_URL:-http://host.docker.internal:4001}
      NOTIFICATION_SERVICE_URL: ${NOTIFICATION_SERVICE_URL:-http://host.docker.internal:3010}

  auth-service:
    build:
      context: ../services/auth-service
    ports:
      - "4001:4001"
    environment:
      SERVICE_NAME: auth-service
      PORT: 4001
      DATABASE_URL: postgres://cab:cabpass@postgres:5432/auth-service_db
      JWT_SECRET: ${JWT_SECRET:-dev-secret}
    depends_on:
      - postgres

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: cab
      POSTGRES_PASSWORD: cabpass
      POSTGRES_DB: cab_booking
    ports:
      - "5432:5432"
    volumes:
      - cab_postgres_data:/var/lib/postgresql/data
      - ./postgres/init:/docker-entrypoint-initdb.d

volumes:
  cab_postgres_data:
