groups:
  - name: cab-monitoring-core
    rules:
      - alert: OTelCollectorScrapeMissing
        expr: up{job="otel-collector"} == 0
        for: 3m
        labels:
          severity: critical
        annotations:
          summary: 'OTel Collector scrape is down'
          description: 'Prometheus cannot scrape otel-collector:8889 for at least 3 minutes.'

      - alert: PrometheusScrapeMissing
        expr: up{job="prometheus"} == 0
        for: 3m
        labels:
          severity: critical
        annotations:
          summary: 'Prometheus scrape target is down'
          description: 'Prometheus target is not healthy for at least 3 minutes.'

      - alert: ServiceDown
        expr: max_over_time(cab_service_up[2m]) == 0
        for: 4m
        labels:
          severity: critical
        annotations:
          summary: 'Service {{ $labels.service_name }} is down'
          description: 'cab_service_up for {{ $labels.service_name }} has been 0 for at least 4 minutes.'

      - alert: ServiceMetricsMissing
        expr: |
          absent_over_time(cab_service_up{service_name="api-gateway"}[5m])
          or absent_over_time(cab_service_up{service_name="auth-service"}[5m])
          or absent_over_time(cab_service_up{service_name="user-service"}[5m])
          or absent_over_time(cab_service_up{service_name="driver-service"}[5m])
          or absent_over_time(cab_service_up{service_name="pricing-service"}[5m])
          or absent_over_time(cab_service_up{service_name="booking-service"}[5m])
          or absent_over_time(cab_service_up{service_name="ride-service"}[5m])
          or absent_over_time(cab_service_up{service_name="payment-service"}[5m])
          or absent_over_time(cab_service_up{service_name="notification-service"}[5m])
          or absent_over_time(cab_service_up{service_name="review-service"}[5m])
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: 'Service metrics stream missing'
          description: 'At least one critical service has no cab_service_up sample in the last 5 minutes.'

      - alert: HighHttpErrorRate
        expr: |
          (
            sum(rate(cab_http_server_requests_total{http_status_code=~"5.."}[10m])) by (service_name)
            /
            clamp_min(sum(rate(cab_http_server_requests_total[10m])) by (service_name), 0.001)
          ) > 0.15
          and
          sum(rate(cab_http_server_requests_total[10m])) by (service_name) > 0.1
        for: 15m
        labels:
          severity: warning
        annotations:
          summary: 'High 5xx error rate on {{ $labels.service_name }}'
          description: '5xx ratio is above 15% with traffic > 0.1 rps for at least 15 minutes.'

      - alert: HighHttpP95Latency
        expr: |
          histogram_quantile(
            0.95,
            sum(rate(cab_http_server_duration_ms_bucket[10m])) by (service_name, le)
          ) > 2000
          and
          sum(rate(cab_http_server_requests_total[10m])) by (service_name) > 0.1
        for: 15m
        labels:
          severity: warning
        annotations:
          summary: 'High p95 latency on {{ $labels.service_name }}'
          description: 'p95 HTTP latency is above 2000ms with traffic > 0.1 rps for at least 15 minutes.'

      - alert: PaymentFailureSpike
        expr: |
          (
            sum(increase(cab_business_events_total{domain="payment",event="status_changed",status="failed",outcome="success"}[15m])) by (service_name)
            /
            clamp_min(sum(increase(cab_business_events_total{domain="payment",event="status_changed",status=~"paid|failed",outcome="success"}[15m])) by (service_name), 1)
          ) > 0.40
          and
          sum(increase(cab_business_events_total{domain="payment",event="status_changed",status=~"paid|failed",outcome="success"}[15m])) by (service_name) >= 20
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: 'Payment failures spiking on {{ $labels.service_name }}'
          description: 'Payment failed ratio is above 40% with at least 20 payment outcomes in 15 minutes.'

      - alert: QueueBacklogHighWarning
        expr: max_over_time(cab_queue_backlog[15m]) > 300
        for: 15m
        labels:
          severity: warning
        annotations:
          summary: 'Queue backlog high on {{ $labels.service_name }}'
          description: 'Queue {{ $labels.queue_name }} backlog exceeded 300 for at least 15 minutes.'

      - alert: QueueBacklogHighCritical
        expr: max_over_time(cab_queue_backlog[10m]) > 600
        for: 10m
        labels:
          severity: critical
        annotations:
          summary: 'Queue backlog critical on {{ $labels.service_name }}'
          description: 'Queue {{ $labels.queue_name }} backlog exceeded 600 for at least 10 minutes.'

      - alert: KafkaConsumerLagHighWarning
        expr: |
          max by (service_name, consumer_group, topic) (max_over_time(cab_kafka_consumer_lag[10m])) > 500
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: 'Kafka consumer lag high on {{ $labels.service_name }}'
          description: 'Consumer group {{ $labels.consumer_group }} on topic {{ $labels.topic }} has lag above 500 for 10 minutes.'

      - alert: KafkaConsumerLagHighCritical
        expr: |
          max by (service_name, consumer_group, topic) (max_over_time(cab_kafka_consumer_lag[10m])) > 2000
        for: 10m
        labels:
          severity: critical
        annotations:
          summary: 'Kafka consumer lag critical on {{ $labels.service_name }}'
          description: 'Consumer group {{ $labels.consumer_group }} on topic {{ $labels.topic }} has lag above 2000 for 10 minutes.'

      - alert: KafkaOutboxBacklogHighWarning
        expr: |
          max by (service_name, queue_name) (max_over_time(cab_outbox_backlog[10m])) > 200
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: 'Outbox backlog high on {{ $labels.service_name }}'
          description: 'Outbox {{ $labels.queue_name }} backlog exceeded 200 for at least 10 minutes.'

      - alert: KafkaOutboxBacklogHighCritical
        expr: |
          max by (service_name, queue_name) (max_over_time(cab_outbox_backlog[10m])) > 1000
        for: 10m
        labels:
          severity: critical
        annotations:
          summary: 'Outbox backlog critical on {{ $labels.service_name }}'
          description: 'Outbox {{ $labels.queue_name }} backlog exceeded 1000 for at least 10 minutes.'

      - alert: KafkaPublishErrorRateHigh
        expr: |
          (
            sum(rate(cab_kafka_publish_total{operation!="publish_dlq",outcome="error"}[10m])) by (service_name, topic)
            /
            clamp_min(sum(rate(cab_kafka_publish_total{operation!="publish_dlq"}[10m])) by (service_name, topic), 0.001)
          ) > 0.05
          and
          sum(rate(cab_kafka_publish_total{operation!="publish_dlq"}[10m])) by (service_name, topic) > 0.1
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: 'Kafka publish error rate high on {{ $labels.service_name }}'
          description: 'Kafka publish error ratio on topic {{ $labels.topic }} exceeded 5% with active traffic for at least 10 minutes.'

      - alert: KafkaDlqRateHigh
        expr: |
          sum(increase(cab_kafka_dlq_total[10m])) by (service_name, source_topic, dlq_topic) >= 20
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: 'DLQ rate high on {{ $labels.service_name }}'
          description: 'At least 20 events were routed to DLQ {{ $labels.dlq_topic }} from {{ $labels.source_topic }} in 10 minutes.'

      - alert: KafkaRetryRateHigh
        expr: |
          sum(increase(cab_kafka_retry_total{status=~"retry|retriable|dead"}[10m])) by (service_name, scope, topic) >= 30
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: 'Kafka retry pressure high on {{ $labels.service_name }}'
          description: 'Retry decisions for {{ $labels.scope }} on topic {{ $labels.topic }} reached at least 30 in 10 minutes.'

      - alert: KafkaProcessingLatencyP95High
        expr: |
          histogram_quantile(
            0.95,
            sum(rate(cab_kafka_processing_latency_ms_bucket[10m])) by (service_name, pipeline, topic, le)
          ) > 3000
          and
          sum(rate(cab_kafka_processing_latency_ms_count[10m])) by (service_name, pipeline, topic) > 0.05
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: 'Kafka processing p95 latency high on {{ $labels.service_name }}'
          description: 'Pipeline {{ $labels.pipeline }} on topic {{ $labels.topic }} has p95 latency above 3000ms for at least 10 minutes.'
