receivers:
  otlp:
    protocols:
      grpc:
      http:

processors:
  batch:

exporters:
  otlp/tempo:
    endpoint: tempo:4317
    tls:
      insecure: true
  prometheus:
    endpoint: "0.0.0.0:8889"
  logging:
    loglevel: info

service:
  pipelines:
    traces:
      receivers: [otlp]
      processors: [batch]
      exporters: [otlp/tempo, logging]
    metrics:
      receivers: [otlp]
      processors: [batch]
      exporters: [prometheus, logging]
    # NOTE:
    # Primary log pipeline is now Docker stdout -> Logstash -> Elasticsearch.
    # TODO: if services emit OTLP logs in the future, add an OTLP logs exporter
    # that forwards to ELK (direct Elasticsearch or via Logstash bridge).
