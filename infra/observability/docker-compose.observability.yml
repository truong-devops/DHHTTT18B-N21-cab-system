x-app-syslog-logging: &app_syslog_logging
  driver: syslog
  options:
    syslog-address: "tcp://${LOGSTASH_SYSLOG_HOST:-host.docker.internal}:${LOGSTASH_SYSLOG_PORT:-5514}"
    syslog-format: rfc5424micro
    tag: "{{.Name}}"

services:
  # Overlay logging config for application services in infra/docker-compose.dev.yml.
  # This keeps base compose unchanged; logs are routed to Logstash only when this
  # observability compose file is included.
  api-gateway:
    logging: *app_syslog_logging

  auth-service:
    logging: *app_syslog_logging

  user-service:
    logging: *app_syslog_logging

  ride-service:
    logging: *app_syslog_logging

  booking-service:
    logging: *app_syslog_logging

  driver-service:
    logging: *app_syslog_logging

  notification-service:
    logging: *app_syslog_logging

  pricing-service:
    logging: *app_syslog_logging

  payment-service:
    logging: *app_syslog_logging

  review-service:
    logging: *app_syslog_logging

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.98.0
    command: ["--config=/etc/otel-collector.yml"]
    volumes:
      - ./observability/otel-collector.yml:/etc/otel-collector.yml:ro
    ports:
      - "4317:4317"   # OTLP gRPC
      - "4318:4318"   # OTLP HTTP
      - "8889:8889"   # Prometheus scrape (metrics)
    depends_on:
      - tempo
    networks:
      - backend

  prometheus:
    image: prom/prometheus:v2.51.1
    command:
      - --config.file=/etc/prometheus/prometheus.yml
    volumes:
      - ./observability/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    networks:
      - backend

  grafana:
    image: grafana/grafana:10.4.2
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./observability/grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "3001:3000"
    depends_on:
      - prometheus
      - tempo
    networks:
      - backend

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.13.4
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      xpack.security.enrollment.enabled: "false"
      ES_JAVA_OPTS: "-Xms512m -Xmx512m"
    volumes:
      - ./observability/elasticsearch/elasticsearch.yml:/usr/share/elasticsearch/config/elasticsearch.yml:ro
      - elasticsearch_data:/usr/share/elasticsearch/data
    ports:
      - "9200:9200"
    networks:
      - backend

  logstash:
    image: docker.elastic.co/logstash/logstash:8.13.4
    environment:
      LS_JAVA_OPTS: "-Xms256m -Xmx256m"
      LOGSTASH_SYSLOG_PORT: ${LOGSTASH_SYSLOG_PORT:-5514}
      DEPLOY_ENV: ${DEPLOY_ENV:-dev}
    volumes:
      - ./observability/logstash/logstash.yml:/usr/share/logstash/config/logstash.yml:ro
      - ./observability/logstash/pipeline:/usr/share/logstash/pipeline:ro
    ports:
      - "${LOGSTASH_SYSLOG_PORT:-5514}:5514"
      - "9600:9600"
    depends_on:
      - elasticsearch
    networks:
      - backend

  kibana:
    image: docker.elastic.co/kibana/kibana:8.13.4
    environment:
      ELASTICSEARCH_HOSTS: http://elasticsearch:9200
    volumes:
      - ./observability/kibana/kibana.yml:/usr/share/kibana/config/kibana.yml:ro
    ports:
      - "5601:5601"
    depends_on:
      - elasticsearch
    networks:
      - backend

  tempo:
    image: grafana/tempo:2.4.1
    command: ["-config.file=/etc/tempo/tempo.yml"]
    volumes:
      - ./observability/tempo.yml:/etc/tempo/tempo.yml:ro
      - tempo_data:/var/tempo
    ports:
      - "3200:3200"
      - "4319:4317"
    networks:
      - backend

volumes:
  prometheus_data:
  grafana_data:
  tempo_data:
  elasticsearch_data:

networks:
  backend:
    driver: bridge
