input {
  syslog {
    port => 5514
  }
}

filter {
  if [message] =~ /^<\d+>1 / {
    grok {
      match => {
        "message" => "^<%{INT:syslog_pri}>1 %{TIMESTAMP_ISO8601:syslog_ts} %{HOSTNAME:syslog_host} %{DATA:docker_container} %{INT:docker_pid} %{DATA:docker_tag} - %{GREEDYDATA:docker_payload}$"
      }
      tag_on_failure => []
    }

    if [docker_payload] {
      mutate {
        replace => {
          "message" => "%{docker_payload}"
        }
        remove_tag => ["_grokparsefailure_sysloginput"]
      }
    }
  }

  ruby {
    code => '
      event.set("environment", ENV.fetch("DEPLOY_ENV", "dev"))
    '
  }

  json {
    source => "message"
    target => "app"
    skip_on_invalid_json => true
  }

  if [app][time] {
    date {
      match => ["[app][time]", "UNIX_MS", "ISO8601"]
      target => "@timestamp"
    }
  } else if [app][timestamp] {
    date {
      match => ["[app][timestamp]", "ISO8601"]
      target => "@timestamp"
    }
  }

  if [app][msg] and [app][msg] != "" {
    mutate {
      replace => {
        "message" => "%{[app][msg]}"
      }
    }
  }

  if [app][serviceName] {
    mutate {
      add_field => {
        "[service][name]" => "%{[app][serviceName]}"
      }
    }
  }

  if [app][traceId] {
    mutate {
      replace => {
        "trace_id" => "%{[app][traceId]}"
      }
    }
  } else if [app][otelTraceId] {
    mutate {
      replace => {
        "trace_id" => "%{[app][otelTraceId]}"
      }
    }
  }

  if [app][spanId] {
    mutate {
      replace => {
        "span_id" => "%{[app][spanId]}"
      }
    }
  } else if [app][otelSpanId] {
    mutate {
      replace => {
        "span_id" => "%{[app][otelSpanId]}"
      }
    }
  }

  if [app][level] {
    ruby {
      code => '
        level = event.get("[app][level]")
        mapped = case level
                 when Integer
                   case level
                   when 10 then "debug"
                   when 20 then "debug"
                   when 30 then "info"
                   when 40 then "warn"
                   when 50 then "error"
                   when 60 then "fatal"
                   else level.to_s
                   end
                 when String
                   level.downcase
                 else
                   nil
                 end
        event.set("level", mapped) if mapped
      '
    }
  }

  if ![service][name] and [docker_container] {
    mutate {
      add_field => {
        "[service][name]" => "%{docker_container}"
      }
      gsub => ["[service][name]", "^/", "", "[service][name]", "-[0-9]+$", ""]
    }
  }

  if ![service][name] and [program] {
    mutate {
      add_field => {
        "[service][name]" => "%{program}"
      }
      gsub => ["[service][name]", "^/", "", "[service][name]", "-[0-9]+$", ""]
    }

    ruby {
      code => '
        known = [
          "api-gateway",
          "auth-service",
          "user-service",
          "ride-service",
          "booking-service",
          "driver-service",
          "notification-service",
          "pricing-service",
          "payment-service",
          "review-service"
        ]
        value = event.get("[service][name]")
        if value
          match = known.find { |name| value.include?(name) }
          event.set("[service][name]", match) if match
        end
      '
    }
  }

  if ![level] and [severity_label] {
    mutate {
      add_field => {
        "level" => "%{severity_label}"
      }
    }
  }

  if ![level] {
    mutate {
      add_field => {
        "level" => "info"
      }
    }
  }

  mutate {
    lowercase => ["level"]
  }
}

output {
  elasticsearch {
    hosts => ["http://elasticsearch:9200"]
    index => "cab-logs-%{+YYYY.MM.dd}"
    ilm_enabled => false
  }
}
